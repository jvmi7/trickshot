name: CI

# Guards the invariants that have no compiler link across processes: the typed
# IPC surface, the Rust core, and the (deprecated-but-preserved) Bun sidecar's
# typecheck. See the SYNC RULE in CLAUDE.md — a one-sided protocol edit won't
# throw at runtime, so these checks are the safety net.
#
# CLI-first note: the sidecar BINARY is no longer bundled (no externalBin) or
# compiled in CI — the live chat is the user's own agent CLI in a PTY. The
# sidecar SOURCE stays typechecked (check:sidecar) + unit-tested so the
# deprecated GUI surface stays revivable; `bun run build:sidecar` remains for
# local use if it ever returns.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # No --omit=optional: the SDK's per-platform optional deps are imported by
      # the sidecar entrypoints, which check:sidecar still typechecks.
      - run: bun install --frozen-lockfile
      - name: Lint + format (Biome)
        run: bunx biome ci
      - name: Typecheck webview (svelte-check)
        run: bun run check
      # The main tsconfig excludes sidecar/**, so this is the ONLY compile-time
      # net for the sidecar half of the hand-mirrored protocol (SYNC RULE) —
      # kept even though the binary no longer ships (preserved code stays alive).
      - name: Typecheck sidecar (tsc)
        run: bun run check:sidecar
      - name: Test (bun)
        run: bun test

  rust:
    name: rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Tauri v2 system dependencies (Ubuntu 24.04).
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libxdo-dev \
            file
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: Test
        run: cargo test
        working-directory: src-tauri

  build:
    name: build (frontend + app integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libxdo-dev \
            file
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Compiles the prod frontend and the app crate together so a
      # capability/config/prod-build break can't slip past CI. (The sidecar
      # binary is no longer part of the bundle — see the header note.)
      - name: Build frontend (vite, prod)
        run: bun run build:vite
      - name: Build app crate (integrated)
        run: cargo build --locked
        working-directory: src-tauri

name: CI

# Guards the invariants that have no compiler link across the three processes:
# the typed IPC/protocol surface, the Rust core, and the Bun sidecar compile.
# See the SYNC RULE in CLAUDE.md — a one-sided protocol edit won't throw at
# runtime, so these checks are the safety net.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (lint · typecheck · sidecar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # No --omit=optional: the SDK ships the native Claude CLI as per-platform
      # optional deps that the sidecar embeds (see README).
      - run: bun install --frozen-lockfile
      - name: Lint + format (Biome)
        run: bunx biome ci
      - name: Typecheck webview (svelte-check)
        run: bun run check
      # `bun build --compile` does NOT typecheck and the main tsconfig excludes
      # sidecar/**, so this is the ONLY compile-time net for the sidecar half of
      # the hand-mirrored protocol (see SYNC RULE).
      - name: Typecheck sidecar (tsc)
        run: bun run check:sidecar
      # test:coverage (not plain `bun test`) so the bunfig coverageThreshold
      # floor is enforced — it catches "deleted the tests, kept the code".
      - name: Test (bun, coverage floor)
        run: bun run test:coverage
      # Compiles sidecar/core.ts (+ the shared protocol module) and embeds the
      # native CLI — catches a broken sidecar before it ships as a stale binary.
      - name: Build sidecar
        run: bun run build:sidecar

  e2e:
    name: e2e (mock-mode UI, Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      # Drives the real webview (headless Chromium) against the mock backend
      # (`vite --mode mock`) — the UI-level regression net the unit layer can't
      # see. See CLAUDE.md › "Testing changes in the running app".
      - name: E2E suite
        run: bun run e2e
      # Failure artifacts: screenshots + retry traces (playwright.config.ts sets
      # trace: on-first-retry), so a red run is debuggable without a local repro.
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: e2e/.results
          retention-days: 7

  rust:
    name: rust (fmt · clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Tauri v2 system dependencies (Ubuntu 24.04).
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libxdo-dev \
            file
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # tauri-build validates that the `externalBin` sidecar exists for the host
      # triple. The real binary is gitignored and built in the frontend job; clippy
      # only needs the crate to compile, so a stub file satisfies the resource check.
      - name: Stub sidecar binary (for the externalBin resource check)
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/agent-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/agent-x86_64-unknown-linux-gnu
      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: Test
        run: cargo test
        working-directory: src-tauri

  build:
    name: build (real sidecar + app integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libxdo-dev \
            file
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Unlike the rust job (which stubs the binary for clippy), this builds the
      # REAL sidecar and frontend, then compiles the app crate against them — so
      # an externalBin/capability/frontend-prod-build break can't slip past CI.
      - name: Build sidecar (host triple)
        run: bun run build:sidecar
      - name: Build frontend (vite, prod)
        run: bun run build:vite
      - name: Build app crate (integrated)
        run: cargo build --locked
        working-directory: src-tauri

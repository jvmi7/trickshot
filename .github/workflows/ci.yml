name: CI

# Guards the invariants that have no compiler link across the two processes:
# the typed IPC surface (webview) and the Rust core. See the SYNC RULE in
# CLAUDE.md — a one-sided command/envelope edit won't throw at runtime, so
# these checks are the safety net.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend (lint · typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint + format (Biome)
        run: bunx biome ci
      - name: Typecheck webview (svelte-check)
        run: bun run check
      - name: Test (bun)
        run: bun test

  rust:
    name: rust (fmt · clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Tauri v2 system dependencies (Ubuntu 24.04).
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libxdo-dev \
            file
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - name: Test
        run: cargo test
        working-directory: src-tauri

  build:
    name: build (frontend + app integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libxdo-dev \
            file
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Builds the real frontend, then compiles the app crate against it — so a
      # capability/frontend-prod-build break can't slip past CI.
      - name: Build frontend (vite, prod)
        run: bun run build:vite
      - name: Build app crate (integrated)
        run: cargo build --locked
        working-directory: src-tauri
